name: Android CI (Auto Build APK)

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Gradle with Specific Version
      uses: gradle/actions/setup-gradle@v4
      with:
        # AGP 9.3.x requires Gradle 9.5.0.
        gradle-version: 9.5.0

    - name: Restore or Generate Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore from debug.keystore.base64..."
          tr -d '\r\n' < debug.keystore.base64 | base64 -d > debug.keystore
        else
          echo "debug.keystore.base64 not found. Generating a temporary debug.keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Build Debug APK with Gradle
      run: gradle :app:assembleDebug

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
